# Banana Mall Nginx 反向代理配置
# 
# 使用方式:
#   1. 修改 server_name 为你的域名
#   2. 修改 proxy_pass 端口为你的服务端口
#   3. 复制到 /etc/nginx/sites-available/banana-mall
#   4. 创建软链接: ln -s /etc/nginx/sites-available/banana-mall /etc/nginx/sites-enabled/
#   5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # ← 修改为你的域名

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 上传文件大小限制 (与 Next.js serverActions bodySizeLimit 对应)
    client_max_body_size 20m;

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 和页面代理
    location / {
        proxy_pass http://127.0.0.1:3000;  # ← 修改为你的服务端口
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 长连接支持（AI 生成可能耗时较长）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 日志
    access_log /var/log/nginx/banana-mall-access.log;
    error_log /var/log/nginx/banana-mall-error.log;
}

