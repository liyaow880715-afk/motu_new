name: Build & Release Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: |
          taskkill /F /IM node.exe 2>$null
          npm run prisma:generate
        shell: pwsh

      - name: Build Windows Installer
        run: npm run dist:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: Get-ChildItem dist-desktop/
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-desktop/*.exe
            dist-desktop/*.blockmap

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Build Mac DMG + ZIP
        run: npm run dist:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: ls -la dist-desktop/

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-packages
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.blockmap

  release:
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-packages
          path: artifacts/mac

      - name: Flatten artifacts
        run: |
          mkdir -p release
          cp artifacts/windows/* release/ 2>/dev/null || true
          cp artifacts/mac/* release/ 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
